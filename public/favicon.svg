<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Background rounded square -->
  <rect width="32" height="32" rx="7" fill="#09090b"/>

  <!-- "R" lettermark — clean, geometric -->
  <text
    x="5"
    y="24"
    font-family="ui-sans-serif, system-ui, -apple-system, sans-serif"
    font-size="22"
    font-weight="700"
    fill="white"
    letter-spacing="-1"
  >R</text>

  <!-- Small "md" tag bottom-right — monospace feel -->
  <rect x="17" y="19" width="13" height="8" rx="2" fill="#27272a"/>
  <text
    x="19"
    y="26"
    font-family="ui-monospace, monospace"
    font-size="7"
    font-weight="600"
    fill="#a1a1aa"
  >md</text>
</svg>
